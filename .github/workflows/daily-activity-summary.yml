name: Daily Activity Summary

on:
  schedule:
    - cron: '0 4 * * *'  # Midnight ET (04:00 UTC)
  workflow_dispatch:

jobs:
  activity-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate activity summary
        run: node scripts/daily-activity-summary.js

      - name: Commit summary
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/activity-summary-*.md
          if git diff --staged --quiet; then
            echo "No new summary to commit"
            exit 0
          fi
          git commit -m "Daily activity summary $(date +%Y-%m-%d)"
          git push || true
